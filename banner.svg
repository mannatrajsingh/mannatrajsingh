<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <rect width="1200" height="200" fill="#0d1117"/>
  
  <!-- concentric circles with noise-like feel using opacity layers -->
  <g transform="translate(600, 100)" fill="none" stroke="#ffffff">
    <circle r="20"  stroke-opacity="0.25" stroke-width="18"/>
    <circle r="48"  stroke-opacity="0.20" stroke-width="18"/>
    <circle r="80"  stroke-opacity="0.16" stroke-width="18"/>
    <circle r="114" stroke-opacity="0.13" stroke-width="18"/>
    <circle r="150" stroke-opacity="0.10" stroke-width="18"/>
    <circle r="188" stroke-opacity="0.08" stroke-width="18"/>
    <circle r="228" stroke-opacity="0.06" stroke-width="18"/>
    <circle r="270" stroke-opacity="0.05" stroke-width="18"/>
    <circle r="314" stroke-opacity="0.04" stroke-width="18"/>
    <circle r="360" stroke-opacity="0.03" stroke-width="18"/>
    <circle r="408" stroke-opacity="0.025" stroke-width="18"/>
    <circle r="458" stroke-opacity="0.02" stroke-width="18"/>
    <circle r="510" stroke-opacity="0.015" stroke-width="18"/>
    <circle r="564" stroke-opacity="0.01" stroke-width="18"/>
    <circle r="620" stroke-opacity="0.008" stroke-width="18"/>
  </g>

  <!-- name text -->
  <text
    x="600" y="108"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="600"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1"
  >Hey, I am Mannat ! 👋</text>
</svg>
